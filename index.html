  .hero h1 em { color:var(--gold); font-style:normal; }
  .hero p { color:#94a3b8; font-size:0.9rem; margin-bottom:1.2rem; }
  .search-wrap { max-width:480px; margin:0 auto; position:relative; }
  .search-wrap input { width:100%; padding:0.75rem 1rem 0.75rem 2.6rem; border-radius:12px; border:none; font-size:0.95rem; font-family:'Hind',sans-serif; background:rgba(255,255,255,0.12); color:#fff; outline:none; }

  .search-icon { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); pointer-events:none; }
  .filters { padding:1rem 1.2rem 0.4rem; display:flex; gap:0.4rem; overflow-x:auto; scrollbar-width:none; }
  .filters::-webkit-scrollbar { display:none; }
  .filter-label { font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; white-space:nowrap; align-self:center; margin-right:0.2rem; }
  .chip { padding:0.35rem 0.9rem; border-radius:20px; border:1.5px solid var(--border); background:var(--card); font-size:0.8rem; font-family:'Hind',sans-serif; font-weight:600; cursor:pointer; white-space:nowrap; color:var(--muted); transition:all 0.15s; }
  .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .main { display:grid; grid-template-columns:220px 1fr; max-width:1200px; margin:1rem auto; padding:0 1rem; }
  @media(max-width:700px){ .main{grid-template-columns:1fr;} .sidebar{display:none;} }
  .sidebar { padding:0 1rem 1rem 0; }
  .sidebar-title { font-size:0.68rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; }
  .subject-btn { display:flex; align-items:center; gap:0.5rem; width:100%; padding:0.5rem 0.7rem; border-radius:8px; border:none; background:transparent; font-family:'Hind',sans-serif; font-size:0.85rem; color:var(--ink); cursor:pointer; text-align:left; margin-bottom:2px; transition:background 0.15s; }
  .subject-btn:hover { background:var(--border); }
  .subject-btn.active { background:#fff3ec; color:var(--accent); font-weight:600; }
  .content { padding-bottom:2rem; }
  .info-bar { background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:10px; padding:0.65rem 1rem; margin-bottom:1rem; font-size:0.8rem; color:#166534; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
  .section-title { font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:700; }
  .count-badge { font-size:0.7rem; background:var(--border); color:var(--muted); padding:2px 8px; border-radius:10px; font-weight:600; }
  .book-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:0.65rem; margin-bottom:1.8rem; }
  .book-card { background:var(--card); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; transition:transform 0.15s,box-shadow 0.15s; }
  .book-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.09); }
  .book-thumb { height:78px; display:flex; align-items:center; justify-content:center; font-size:2rem; position:relative; }
  .ready-dot { position:absolute; top:6px; right:6px; font-size:0.58rem; color:#fff; padding:2px 5px; border-radius:8px; font-weight:700; }
  .book-info { padding:0.5rem 0.65rem 0.6rem; }
  .book-subject { font-size:0.63rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:2px; }
  .book-name { font-size:0.78rem; font-weight:600; color:var(--ink); line-height:1.3; margin-bottom:0.4rem; }
  .book-actions { display:flex; gap:0.3rem; }
  .btn-read { flex:1; padding:0.3rem 0; background:var(--accent); color:#fff; border:none; border-radius:6px; font-size:0.7rem; font-family:'Hind',sans-serif; font-weight:600; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }

  { id:'12-geo1',    cls:'12', subj:'Geography', emoji:'🗺️', bg:'#ecfdf5', ac:'#059669', name:'Manav Bhoogol Part 1',         url:'https://ncert.nic.in/textbook/pdf/lhgg1dd.pdf' },
  { id:'12-geo2',    cls:'12', subj:'Geography', emoji:'🗺️', bg:'#ecfdf5', ac:'#059669', name:'India: Log aur Arthvyavastha', url:'https://ncert.nic.in/textbook/pdf/lhgg2dd.pdf' },
  { id:'12-eco1',    cls:'12', subj:'Economics', emoji:'💰', bg:'#fefce8', ac:'#a16207', name:'Vyashti Arthshastra',          url:'https://ncert.nic.in/textbook/pdf/leec1dd.pdf' },

  { id:'12-pol2',    cls:'12', subj:'Polity',    emoji:'⚖️', bg:'#fff7ed', ac:'#ea580c', name:'Samkaleen Vishwa Rajneeti',    url:'https://ncert.nic.in/textbook/pdf/lhps2dd.pdf' },
];

let activeClass='all', activeSubject='all';

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const c = document.getElementById('booksContainer');
  const filtered = books.filter(b =>
    (activeClass==='all' || b.cls===activeClass) &&
    (activeSubject==='all' || b.subj===activeSubject) &&
    (!q || b.name.toLowerCase().includes(q) || b.subj.toLowerCase().includes(q) || b.cls.includes(q))
  );
  if (!filtered.length) { c.innerHTML=`<div class="empty"><div style="font-size:3rem">📭</div><p>कोई किताब नहीं मिली</p></div>`; return; }
  const groups={};
  filtered.forEach(b=>{ if(!groups[b.cls]) groups[b.cls]=[]; groups[b.cls].push(b); });
  c.innerHTML = Object.keys(groups).sort((a,b)=>+a-+b).map(cls=>`
    <div class="section-header">
      <div class="section-title">कक्षा ${cls}</div>
      <div class="count-badge">${groups[cls].length} किताबें</div>
    </div>
    <div class="book-grid">${groups[cls].map(b=>`
      <div class="book-card">
        <div class="book-thumb" style="background:${b.bg}">
          ${b.emoji}
          <span class="ready-dot" style="background:${b.ac}">✓ Ready</span>
        </div>
        <div class="book-info">
          <div class="book-subject" style="color:${b.ac}">${b.subj}</div>
          <div class="book-name">${b.name}</div>
          <div class="book-actions">
            <a class="btn-read" href="${b.url}" target="_blank">📖 पढ़ें</a>
            <a class="btn-dl" href="${b.url}" download target="_blank" title="Download">⬇</a>
          </div>
        </div>
      </div>`).join('')}
    </div>
  `).join('');
}

function filterClass(cls, el) {
  activeClass=cls;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); render();
}
function filterSubject(s, el) {
  activeSubject=s;
  document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); render();
}
render();
</script>
